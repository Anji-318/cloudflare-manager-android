name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 0.3.2)'
        required: true
        default: '0.3.1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Update version in build.gradle.kts
        run: |
          sed -i "s/versionName = \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/versionName = \"${{ github.event.inputs.version }}\"/" app/build.gradle.kts
          echo "Version updated to ${{ github.event.inputs.version }}"
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
      
      - name: Rename APK with version
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/CFManager-v${{ github.event.inputs.version }}.apk
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CFManager-v${{ github.event.inputs.version }}
          path: release/*.apk
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
